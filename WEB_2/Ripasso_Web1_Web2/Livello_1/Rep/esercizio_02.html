<!-- 2. Lista Stilizzata 
Richiesto: creare una lista ul con 4 elementi. Il 2° e il 4° devono avere 
stile diverso (bordo, colore sfondo, grassetto). 

Usare: selettore CSS nth-child, proprietà di bordo, sfondo, font-weight. 

Risultato: lista verticale dove alcuni elementi risultano evidenziati. -->
<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" />
    <title>Lista Stilizzata</title>

    <style>
      .lista_elementi li:nth-child(2),
      .lista_elementi li:nth-child(4) {
        background-color: rgb(35, 138, 142);
        border:1px solid;
        font-weight: bold;
        padding: 5px;
      }
    </style>
  </head>

  <body>
    <ul class="lista_elementi">
      <li>Elemento_1</li>
      <li>Elemento_2</li>
      <li>Elemento_3</li>
      <li>Elemento_4</li>
    </ul>
  </body>
</html>
